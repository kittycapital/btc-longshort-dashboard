name: Update Coin List

on:
  schedule:
    # 하루 1회: 01:00 UTC = 10:00 KST
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch Coin List
        run: python fetch_longshort.py
        timeout-minutes: 5

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/coins.json
          git diff --staged --quiet || git commit -m "📊 코인 목록 업데이트 $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
